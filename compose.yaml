version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    container_name: magic3t-postgres
    cpus: 0.1
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: magic3t
    ports:
      - "5432:5432"
    volumes:
      - D://data/magic3t-postgres:/var/lib/postgresql
